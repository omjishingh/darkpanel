services:
  - type: web
    name: dark-panel-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_PATH
        value: /opt/render/project/src/data/accounts.json
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: TELEGRAM_2FA_ENABLED
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
